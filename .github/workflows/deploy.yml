name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Refresh Cloudflare Token
        id: cf_token
        run: |
          RESPONSE=$(curl -s -X POST "https://dash.cloudflare.com/oauth2/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=refresh_token&refresh_token=${{ secrets.CLOUDFLARE_REFRESH_TOKEN }}&client_id=54d11594-84e4-41aa-b438-e81b8fa78ee7")
          ACCESS_TOKEN=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          NEW_REFRESH=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['refresh_token'])")
          echo "access_token=$ACCESS_TOKEN" >> $GITHUB_OUTPUT
          echo "new_refresh=$NEW_REFRESH" >> $GITHUB_OUTPUT

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy . --project-name student-run --branch main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ steps.cf_token.outputs.access_token }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
